data:
  root: C:/Users/remoteuser/research/lane-detection-uda/data/CARLANE/MoLane/data
  splits_root: C:/Users/remoteuser/research/lane-detection-uda/data/CARLANE/MoLane/splits
  img_height: 360
  img_width: 640
  num_workers: 16
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2

training:
  batch_size: 24
  num_epochs: 20
  learning_rate: 1e-4
  device: cuda
  seed: 42
  use_amp: true
  enable_cudnn_benchmark: true
  enable_tf32: true

uda:
  alpha: 0.1
  learning_rate: 5e-5

model:
  n_classes: 2
  pretrained_weights: true

logging:
  log_dir: results/logs
  save_interval: 5

output_dir: .