data:
  root: C:/Users/remoteuser/research/lane-detection-uda/data/CARLANE/MoLane/data
  splits_root: C:/Users/remoteuser/research/lane-detection-uda/data/CARLANE/MoLane/splits
  img_height: 360
  img_width: 640
  num_workers: 8          # 8 is usually the sweet spot on Windows; 16 can cause IPC bottlenecks
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 4      # increased from 2 → keeps GPU fed

training:
  batch_size: 16          # RTX 3060 12 GB: 16 is safe with AMP; try 20 if VRAM allows
  num_epochs: 25
  learning_rate: 1e-4
  weight_decay: 1e-4      # AdamW regularisation (replaces plain Adam)
  device: cuda
  seed: 42
  use_amp: true           # FP16 mixed precision — big speed-up, no accuracy loss
  enable_cudnn_benchmark: true
  enable_tf32: true
  grad_clip: 1.0          # gradient norm clipping — stabilises training
  label_smoothing: 0.1    # slight regularisation on CE loss
  warmup_epochs: 3        # linear LR warm-up before cosine decay kicks in
  torch_compile: false    # set true to try torch.compile (PyTorch 2.x, slower first epoch)
  # resume_from: auto     # uncomment to force a specific checkpoint path
                          # 'auto' (default) resumes from results/checkpoints/*/last.pth

uda:
  alpha: 0.1              # weight for entropy loss
  learning_rate: 5e-5

model:
  n_classes: 2
  pretrained_weights: true
  gradient_checkpointing: false  # set true to trade compute for VRAM if batch_size is tight

logging:
  log_dir: results/logs
  save_interval: 5        # save a periodic checkpoint every N epochs

output_dir: .